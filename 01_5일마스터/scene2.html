<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><style>
  :root{--ink:#2A2521;--sans:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Helvetica Neue",Arial,sans-serif;}
  *{margin:0;padding:0;box-sizing:border-box;font-family:var(--sans);-webkit-font-smoothing:antialiased;}
  .frame{width:1080px;height:1920px;background:linear-gradient(157deg,#E5906B 0%,#C2632F 100%);color:#FBF4EA;
         display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:0 80px;}
  .mk{width:120px;height:120px;margin-bottom:30px;}
  .k{font-size:32px;font-weight:800;letter-spacing:5px;color:rgba(255,255,255,.85);}
  h2{font-size:104px;font-weight:800;letter-spacing:-3px;line-height:1.04;margin-top:24px;}
  h2 .u{color:#FFE6D8;}
  .get{margin-top:54px;display:flex;flex-direction:column;gap:24px;align-items:flex-start;}
  .get .g{display:flex;align-items:center;gap:22px;font-size:38px;font-weight:600;color:#FFF3EC;}
  .get .g .ic{width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .get .g .ic svg{width:28px;height:28px;stroke:#fff;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round;}
  .box{margin-top:72px;background:#fff;border-radius:30px;padding:46px 60px;font-size:52px;font-weight:800;color:var(--ink);box-shadow:0 28px 64px rgba(120,50,25,.34);display:flex;align-items:center;gap:20px;}
  .box .kw{background:#D97757;color:#fff;padding:10px 28px;border-radius:16px;}
  .foot{margin-top:50px;font-size:34px;font-weight:800;color:rgba(255,255,255,.92);}
</style></head>
<body>
  <div class="frame">
    <svg class="mk" viewBox="-50 -50 100 100"><g fill="#FBF4EA">
      <path d="M0-46C3-22 3-16 0-11C-3-16-3-22 0-46Z"/><path d="M0-46C3-22 3-16 0-11C-3-16-3-22 0-46Z" transform="rotate(45)"/><path d="M0-46C3-22 3-16 0-11C-3-16-3-22 0-46Z" transform="rotate(90)"/><path d="M0-46C3-22 3-16 0-11C-3-16-3-22 0-46Z" transform="rotate(135)"/><path d="M0-46C3-22 3-16 0-11C-3-16-3-22 0-46Z" transform="rotate(180)"/><path d="M0-46C3-22 3-16 0-11C-3-16-3-22 0-46Z" transform="rotate(225)"/><path d="M0-46C3-22 3-16 0-11C-3-16-3-22 0-46Z" transform="rotate(270)"/><path d="M0-46C3-22 3-16 0-11C-3-16-3-22 0-46Z" transform="rotate(315)"/>
    </g></svg>
    <div class="k">전체 가이드</div>
    <h2>댓글 달면<br><span class="u">노션 링크</span> 드려요</h2>
    <div class="get">
      <div class="g"><span class="ic"><svg viewBox="0 0 24 24"><path d="M5 12l5 5 9-11"/></svg></span>5일 체크리스트 + 켜는 법</div>
      <div class="g"><span class="ic"><svg viewBox="0 0 24 24"><path d="M5 12l5 5 9-11"/></svg></span>프로젝트vs스킬 비교표</div>
      <div class="g"><span class="ic"><svg viewBox="0 0 24 24"><path d="M5 12l5 5 9-11"/></svg></span>꼭 기억할 3가지</div>
    </div>
    <div class="box">댓글 <span class="kw">클로드</span></div>
    <div class="foot">저장 🔖 + 팔로우</div>
  </div>
</body></html>
