<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><style>
  :root{--clay:#D97757;--clay-deep:#A24E32;--brown:#6E4632;--ink:#2A2521;--bg:#EFE4D2;--line:#E6D9C6;
        --sans:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Helvetica Neue",Arial,sans-serif;}
  *{margin:0;padding:0;box-sizing:border-box;font-family:var(--sans);-webkit-font-smoothing:antialiased;}
  .frame{width:1080px;height:1920px;background:var(--bg);display:flex;flex-direction:column;align-items:center;
         justify-content:center;padding:0 40px;position:relative;}
  .top{position:absolute;top:96px;left:0;right:0;text-align:center;}
  .top .badge{display:inline-block;background:var(--brown);color:#F6EAD9;font-size:26px;font-weight:800;letter-spacing:4px;padding:10px 26px;border-radius:30px;}
  .top h1{font-size:62px;font-weight:800;color:var(--ink);letter-spacing:-2px;margin-top:22px;line-height:1.05;}
  .top h1 .c{color:var(--clay);}
  .top .save{margin-top:18px;font-size:34px;font-weight:800;color:var(--clay-deep);}
  .shot{width:1010px;border-radius:24px;box-shadow:0 30px 70px rgba(120,70,40,.28);overflow:hidden;border:1px solid var(--line);margin-top:150px;}
  .shot img{width:100%;display:block;}
  .bottom{position:absolute;bottom:70px;left:0;right:0;text-align:center;font-size:30px;font-weight:800;color:var(--clay-deep);letter-spacing:.5px;}
</style></head>
<body>
  <div class="frame">
    <div class="top">
      <span class="badge">5-DAY MASTERY</span>
      <h1>클로드 <span class="c">5일</span> 마스터</h1>
      <div class="save">🔖 저장하고 하루 하나씩</div>
    </div>
    <div class="shot"><img src="file:///tmp/cv006/master.png"></div>
    <div class="bottom">@claude_lab.kr</div>
  </div>
</body></html>
