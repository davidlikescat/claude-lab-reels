<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><style>
  :root{--clay:#D97757;--clay-deep:#A24E32;--brown:#6E4632;--ink:#2A2521;--muted:#8A7E70;
        --bg:#EFE4D2;--card:#FFFFFF;--line:#E6D9C6;
        --sans:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Helvetica Neue",Arial,sans-serif;
        --mono:"SF Mono",ui-monospace,Menlo,Consolas,monospace;}
  *{margin:0;padding:0;box-sizing:border-box;font-family:var(--sans);-webkit-font-smoothing:antialiased;}
  .frame{width:1080px;height:1920px;background:var(--bg);padding:110px 80px;display:flex;flex-direction:column;position:relative;}
  .badge{align-self:flex-start;background:var(--brown);color:#F6EAD9;font-size:28px;font-weight:800;letter-spacing:5px;padding:11px 28px;border-radius:30px;}
  h1{font-size:96px;font-weight:800;color:var(--ink);letter-spacing:-3px;line-height:1.04;margin-top:34px;}
  h1 .c{color:var(--clay);}
  .sub{font-size:40px;font-weight:700;color:var(--muted);margin-top:26px;}
  .list{margin-top:60px;display:flex;flex-direction:column;gap:26px;}
  .row{display:flex;align-items:center;gap:30px;background:var(--card);border:1.5px solid var(--line);border-radius:24px;padding:30px 36px;box-shadow:0 10px 28px rgba(120,70,40,.07);}
  .cmd{font-family:var(--mono);font-size:46px;font-weight:800;color:#fff;background:var(--clay);padding:14px 26px;border-radius:16px;flex:0 0 auto;letter-spacing:-1px;}
  .desc{font-size:38px;font-weight:600;color:var(--ink);line-height:1.25;}
  .caveat{margin-top:44px;font-size:30px;font-weight:600;color:var(--muted);line-height:1.4;}
  .caveat b{color:var(--clay-deep);font-weight:800;}
  .foot{position:absolute;bottom:80px;left:80px;right:80px;display:flex;justify-content:space-between;align-items:center;}
  .foot .h{font-size:34px;font-weight:800;color:var(--clay-deep);}
  .foot .save{font-size:32px;font-weight:800;color:var(--ink);background:var(--card);border:1.5px solid var(--line);border-radius:40px;padding:16px 32px;}
</style></head>
<body>
  <div class="frame">
    <span class="badge">CLAUDE SHORTCUTS</span>
    <h1>긴 프롬프트,<br>매번 다시 <span class="c">치세요?</span></h1>
    <div class="sub">한 단어로 끝내는 단축어 5개</div>
    <div class="list">
      <div class="row"><span class="cmd">/정리</span><span class="desc">핵심 3줄 + 실행 포인트</span></div>
      <div class="row"><span class="cmd">/보고</span><span class="desc">두괄식 한 장 보고서</span></div>
      <div class="row"><span class="cmd">/검토</span><span class="desc">약점·리스크 깐깐하게</span></div>
      <div class="row"><span class="cmd">/영어</span><span class="desc">비즈니스 영어로</span></div>
      <div class="row"><span class="cmd">/생각</span><span class="desc">아이디어 10개 + 난이도</span></div>
    </div>
    <div class="caveat">※ '/이름'은 앱 기능이 아니라 <b>내가 정한 약속어</b> — 프로젝트가 기억해서 따릅니다.</div>
    <div class="foot"><span class="h">@claude_lab.kr</span><span class="save">🔖 저장</span></div>
  </div>
</body></html>
